# ==========================================
# 1. BASE DE DADOS (Dinâmica)
# ==========================================
# Na nuvem, o Spring usa o que está antes dos dois pontos (:). 
# No teu computador, ele usa o que está depois (localhost).
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/myfinn_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:password123}
spring.datasource.driver-class-name=org.postgresql.Driver

# ==========================================
# 2. HIBERNATE (Segurança dos Dados)
# ==========================================
# 'update' garante que as tabelas NÃO são apagadas quando o Render reinicia a API.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# ==========================================
# 3. SEGURANÇA (JWT)
# ==========================================
api.security.token.secret=${JWT_SECRET:minha_chave_secreta_padrao_para_desenvolvimento_local}